    body {
      background:
      linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
      url('mainpage.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;

      cursor: none;
    }

    /* FEATHER CURSOR */
    .feather-cursor {
      width: 40px;
      height: 40px;
      position: fixed;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999;
    }

    /* SPARKLES */
    .sparkle {
      position: fixed;
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      animation: fadeOut 0.6s linear forwards;
      z-index: 9998;
    }

    @keyframes fadeOut {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0); }
    }

    /* LOADER */
    #loader {
      position: fixed;
      inset: 0;
      background: rgba(17, 24, 39, 0.95);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 9999;
    }

    .pen-loader {
      width: 130px;
      animation: write 1.2s infinite ease-in-out;
      transform-origin: bottom center;
    }

    @keyframes write {
      0% { transform: rotate(-15deg) translateX(0); }
      25% { transform: rotate(0deg) translateX(10px); }
      50% { transform: rotate(-10deg) translateX(20px); }
      75% { transform: rotate(0deg) translateX(10px); }
      100% { transform: rotate(-15deg) translateX(0); }
    }

    .loading-text {
      margin-top: 20px;
      color: white;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 3px;
    }

    .cursor-blink {
      display: inline-block;
      animation: blink 0.7s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
  </style>
</head>

<script>
  const loader = document.getElementById("loader");
  const typingText = document.getElementById("typingText");

  const word = "NAGSUSULAT...";
  let i = 0;

  function typeWriter(callback) {
    typingText.innerHTML = "";
    i = 0;

    function typing() {
      if (i < word.length) {
        typingText.innerHTML += word.charAt(i);
        i++;
        setTimeout(typing, 80);
      } else {
        if (callback) callback();
      }
    }

    typing();
  }

  document.querySelectorAll(".topic-link").forEach(link => {
    link.addEventListener("click", function(e) {
      e.preventDefault();

      const destination = this.href;
      loader.style.display = "flex";

      typeWriter(() => {
        setTimeout(() => {
          window.location.href = destination;
        }, 300);
      });
    });
  });

  window.addEventListener("pageshow", () => {
    loader.style.display = "none";
  });

  /* SAFE CURSOR (GitHub-safe) */
  const feather = document.querySelector(".feather-cursor");

  if (feather) {
    document.addEventListener("mousemove", (e) => {
      feather.style.left = e.clientX + "px";
      feather.style.top = e.clientY + "px";

      const sparkle = document.createElement("div");
      sparkle.classList.add("sparkle");

      sparkle.style.left = e.clientX + "px";
      sparkle.style.top = e.clientY + "px";

      document.body.appendChild(sparkle);

      setTimeout(() => sparkle.remove(), 600);
    });
  }
</script>
