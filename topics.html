    body {

      url('mainpage.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    /* LOADER */
    #loader {
      position: fixed;
      inset: 0;
      background: rgba(17, 24, 39, 0.95);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 9999;
    }

    /* PEN ANIMATION */
    .pen-loader {
      width: 130px;
      animation: write 1.2s infinite ease-in-out;
      transform-origin: bottom center;
    }

    @keyframes write {
      0% { transform: rotate(-15deg) translateX(0); }
      25% { transform: rotate(0deg) translateX(10px); }
      50% { transform: rotate(-10deg) translateX(20px); }
      75% { transform: rotate(0deg) translateX(10px); }
      100% { transform: rotate(-15deg) translateX(0); }
    }

    .loading-text {
      margin-top: 20px;
      color: white;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 3px;
    }
  </style>
</head>

<!-- SCRIPT -->
<script>
  const loader = document.getElementById("loader");

  // CLICK HANDLER (with memory fix)
  document.querySelectorAll(".topic-link").forEach(link => {
    link.addEventListener("click", function(e) {
      e.preventDefault();

      sessionStorage.setItem("fromTopics", "true");

      const destination = this.href;
      loader.style.display = "flex";

      setTimeout(() => {
        window.location.href = destination;
      }, 900);
    });
  });

  // BACK BUTTON FIX
  window.addEventListener("pageshow", function() {
    const fromTopics = sessionStorage.getItem("fromTopics");

    if (fromTopics === "true") {
      loader.style.display = "none";
      sessionStorage.removeItem("fromTopics");

      document.getElementById("topics")?.scrollIntoView({ behavior: "smooth" });
    }
  });

  // safety hide loader on normal load
  window.addEventListener("load", () => {
    loader.style.display = "none";
  });
</script>
