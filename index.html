<!DOCTYPE html>
<html lang="tl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panitikan</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>

    /* PAGE FADE */
    body {
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }

    body.loaded {
      opacity: 1;
    }

    /* LOADER */
    #loader {
      transition: opacity 0.3s ease;
    }

    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* PEN ANIMATION (slower, smoother) */
    @keyframes penMove {
      0% {
        left: 0;
        transform: rotate(-10deg);
      }

      50% {
        transform: rotate(8deg);
      }

      100% {
        left: 120px;
        transform: rotate(-10deg);
      }
    }

    .animate-pen {
      animation: penMove 2.2s infinite ease-in-out;
    }

  </style>
</head>

<body class="bg-gray-100 font-sans">

  <!-- LOADER -->
  <div id="loader"
       class="fixed inset-0 bg-[#f8f1e7] flex flex-col items-center justify-center z-50 hidden">

    <div class="relative w-40 h-20">

      <div class="absolute top-10 left-0 w-32 h-1 bg-gray-400"></div>

      <div class="absolute top-4 left-0 text-4xl animate-pen">
        ✒️
      </div>

    </div>

    <p class="mt-6 text-lg font-semibold text-gray-700">
      Ipinoproseso...
    </p>

  </div>

  <!-- HEADER -->
  <header class="bg-white shadow p-6 text-center">

    <h1 class="text-2xl font-bold">
      Mga Akdang Tuluyan o Prosa
    </h1>

    <p class="text-gray-600">
      Panitikang Pilipino
    </p>

  </header>

  <!-- PANITIKAN -->
  <section class="max-w-3xl mx-auto p-6 bg-white mt-4 rounded shadow text-center">

    <h2 class="text-xl font-bold mb-2">PANITIKAN</h2>

    <p class="text-gray-700">
      Ang panitikan ay tumutukoy sa mga akdang nagpapahayag ng damdamin,
      kaisipan, at karanasan ng tao sa pamamagitan ng malikhaing paggamit ng wika.
    </p>

  </section>

  <!-- GRID -->
  <main class="max-w-5xl mx-auto p-6 grid grid-cols-1 md:grid-cols-2 gap-6">

    <a href="alamat.html" onclick="goPage(event,'alamat.html')"
       class="block rounded overflow-hidden shadow hover:scale-105 transition">
      <img src="https://source.unsplash.com/800x400/?legend" class="w-full h-48 object-cover">
      <div class="bg-white p-4 font-semibold text-center">ALAMAT</div>
    </a>

    <a href="anekdota.html" onclick="goPage(event,'anekdota.html')"
       class="block rounded overflow-hidden shadow hover:scale-105 transition">
      <img src="https://source.unsplash.com/800x400/?story" class="w-full h-48 object-cover">
      <div class="bg-white p-4 font-semibold text-center">ANEKDOTA</div>
    </a>

    <a href="pabula.html" onclick="goPage(event,'pabula.html')"
       class="block rounded overflow-hidden shadow hover:scale-105 transition">
      <img src="https://source.unsplash.com/800x400/?animal" class="w-full h-48 object-cover">
      <div class="bg-white p-4 font-semibold text-center">PABULA</div>
    </a>

    <a href="parabula.html" onclick="goPage(event,'parabula.html')"
       class="block rounded overflow-hidden shadow hover:scale-105 transition">
      <img src="https://source.unsplash.com/800x400/?light" class="w-full h-48 object-cover">
      <div class="bg-white p-4 font-semibold text-center">PARABULA</div>
    </a>

  </main>

  <script>

    // PAGE FADE IN
    window.addEventListener("load", () => {
      document.body.classList.add("loaded");
    });

    // SMOOTH LOADER TRANSITION (no long delay)
    function goPage(event, url) {
      event.preventDefault();

      const loader = document.getElementById("loader");

      loader.classList.remove("hidden");
      document.body.classList.remove("loaded");

      // short smooth transition only
      setTimeout(() => {
        window.location.href = url;
      }, 700);
    }

  </script>

</body>
</html>
